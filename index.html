<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folly Flow • Live Beach Conditions</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #0a1428, #1e3a5f, #2a6b8a);
      color: #fff;
      min-height: 100vh;
      margin: 0;
      position: relative;
      overflow: hidden;
    }

    .ocean {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60%;
      background: linear-gradient(transparent, #0ea5e9);
      z-index: 1;
      animation: wave 12s linear infinite;
    }

    @keyframes wave {
      0% { transform: translateY(0); }
      50% { transform: translateY(25px); }
      100% { transform: translateY(0); }
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 580px;
      margin: 40px auto;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      background: linear-gradient(90deg, #67e8f9, #ffffff, #a5f3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.1rem;
      text-shadow: 0 0 40px rgba(103,232,249,0.6);
    }

    .tagline {
      color: #bae6fd;
      font-size: 1.35rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(103,232,249,0.4);
      border-radius: 28px;
      padding: 2rem;
      margin: 1.8rem 0;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .meter {
      height: 42px;
      background: #112233;
      border-radius: 9999px;
      overflow: hidden;
      margin: 1.2rem 0;
    }
    .fill {
      height: 100%;
      width: 38%;
      background: linear-gradient(90deg, #22d3ee, #67e8f9, #c4f1fd);
      transition: width 2s ease;
      box-shadow: 0 0 35px #67e8f9;
    }

    button {
      background: linear-gradient(90deg, #22d3ee, #67e8f9);
      color: #0a1428;
      border: none;
      padding: 18px 60px;
      font-size: 1.3rem;
      font-weight: 700;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 15px 45px rgba(103,232,249,0.5);
      margin: 1rem 0;
    }
    button:hover {
      transform: scale(1.08);
    }

    .footer {
      margin-top: 4rem;
      color: #94a3b8;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="ocean"></div>

  <div class="container">
    <h1>Folly Flow</h1>
    <p class="tagline">Real-time Beach Conditions • Folly Beach, SC 🌊</p>

    <div class="card">
      <p><strong>Current Crowd Level</strong></p>
      <div class="meter"><div class="fill" id="fill"></div></div>
      <p id="status" style="font-size:2.1rem; font-weight:700; color:#67e8f9; margin:0.8rem 0;">Chill • 4.2 / 10</p>
    </div>

    <div class="card">
      <p><strong>🚗 Folly Road Traffic</strong></p>
      <p style="font-size:1.5rem; margin:0.8rem 0;">Light & Flowing</p>
      <p>No major delays • Post-holiday crowd has left</p>
    </div>

    <div class="card">
      <p><strong>🌊 Tide Information</strong></p>
      <p style="font-size:1.4rem; margin:0.6rem 0;">High Tide: 6:42 PM (4.8 ft)</p>
      <p>Low Tide: 1:15 AM (0.9 ft)</p>
    </div>

    <button onclick="refresh()">⟳ Refresh All Conditions</button>

    <div class="footer">
      Updated • July 5, 2026 • 3:45 PM
    </div>
  </div>

  <script>
    function refresh() {
      document.getElementById('fill').style.width = (20 + Math.random() * 55) + "%";
      document.getElementById('status').textContent = "Chill • " + (2.5 + Math.random()*5).toFixed(1) + " / 10";
      alert("🌊 Conditions updated — Folly is looking chill right now!");
    }
  </script>
</body>
</html>
