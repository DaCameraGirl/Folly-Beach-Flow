<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folly Flow • Live Beach Conditions</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a1428, #1e3a5f, #2a6b8a);
      color: #fff;
      min-height: 100vh;
      margin: 0;
      position: relative;
      overflow: hidden;
    }

    .ocean {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(transparent, #0ea5e9);
      z-index: 1;
      animation: wave 10s linear infinite;
    }

    @keyframes wave {
      0% { transform: translateY(0); }
      50% { transform: translateY(20px); }
      100% { transform: translateY(0); }
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 560px;
      margin: 30px auto;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.6rem;
      background: linear-gradient(90deg, #67e8f9, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline { color: #bae6fd; font-size: 1.25rem; margin: 0.5rem 0 2rem; }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(103,232,249,0.3);
      border-radius: 24px;
      padding: 1.8rem;
      margin: 1.5rem 0;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    .meter {
      height: 34px;
      background: #112233;
      border-radius: 9999px;
      overflow: hidden;
      margin: 1rem 0;
    }
    .fill {
      height: 100%;
      width: 38%;
      background: linear-gradient(90deg, #22d3ee, #67e8f9);
      transition: width 1.8s ease;
    }

    button {
      background: linear-gradient(90deg, #22d3ee, #67e8f9);
      color: #0a1428;
      border: none;
      padding: 16px 50px;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 9999px;
      cursor: pointer;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="ocean"></div>

  <div class="container">
    <h1>Folly Flow</h1>
    <p class="tagline">Live Beach Conditions • Folly Beach, SC 🌊</p>

    <div class="card">
      <p><strong>Current Crowd Level</strong></p>
      <div class="meter"><div class="fill" id="fill" style="width:38%"></div></div>
      <p id="status" style="font-size:1.9rem; font-weight:700; color:#67e8f9;">Chill • 3.8 / 10</p>
    </div>

    <div class="card">
      <p><strong>🚗 Folly Road Traffic</strong></p>
      <p style="font-size:1.4rem; margin:0.8rem 0;">Light &amp; Flowing</p>
      <p>No major delays right now</p>
    </div>

    <div class="card">
      <p><strong>🌊 Tide Now</strong></p>
      <p style="font-size:1.5rem; margin:0.5rem 0;">High Tide at 6:42 PM (4.8 ft)</p>
      <p>Low Tide at 1:15 AM (0.9 ft)</p>
    </div>

    <button onclick="refresh()">⟳ Refresh All Conditions</button>

    <p style="margin-top:3rem; color:#94a3b8;">Updated • July 5, 2026 • 3:43 PM</p>
  </div>

  <script>
    function refresh() {
      document.getElementById('fill').style.width = (20 + Math.random() * 55) + "%";
      document.getElementById('status').textContent = "Chill • " + (2.8 + Math.random()*4).toFixed(1) + " / 10";
      alert("🌊 Conditions refreshed!");
    }
  </script>
</body>
</html>
