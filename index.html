<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folly Flow • Live Beach Meter</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a1f3d 0%, #0f3d5e 50%, #1e5f8a 100%);
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .waves {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 45%;
      background: linear-gradient(transparent, rgba(0, 180, 255, 0.2));
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 520px;
      margin: 40px auto;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.4rem;
      background: linear-gradient(90deg, #7dd3fc, #bae6fd, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
      text-shadow: 0 4px 25px rgba(0,0,0,0.5);
    }

    .tagline { color: #bae6fd; font-size: 1.15rem; margin-bottom: 2rem; }

    .meter-container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 30px;
      padding: 2rem 1.5rem;
      margin: 2rem 0;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    .meter {
      height: 36px;
      background: rgba(0,0,0,0.5);
      border-radius: 9999px;
      overflow: hidden;
      margin: 1.5rem 0;
    }
    .fill {
      height: 100%;
      width: 42%;
      background: linear-gradient(90deg, #22d3ee, #67e8f9, #a5f3fc);
      transition: width 1.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 30px #67e8f9;
    }

    .status {
      font-size: 2.1rem;
      font-weight: 700;
      margin: 1rem 0;
      color: #67e8f9;
    }

    .traffic-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid #67e8f9;
      border-radius: 24px;
      padding: 1.8rem;
      margin: 2rem 0;
      text-align: left;
    }

    button {
      background: linear-gradient(90deg, #22d3ee, #67e8f9);
      color: #0a1f3d;
      border: none;
      padding: 16px 52px;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 12px 35px rgba(103,232,249,0.4);
      transition: all 0.3s;
    }
    button:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 45px rgba(103,232,249,0.5);
    }

    .footer {
      margin-top: 3rem;
      font-size: 1rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="waves"></div>
  
  <div class="container">
    <h1>Folly Flow</h1>
    <p class="tagline">Live Crowd & Traffic Meter • Folly Beach, SC</p>

    <div class="meter-container">
      <div style="font-size:1.1rem; margin-bottom:0.5rem; color:#bae6fd;">Current Crowd Level</div>
      <div class="meter"><div class="fill" id="fill"></div></div>
      <div class="status" id="status">Chill Vibes • 4.1 / 10</div>
    </div>

    <div class="traffic-box">
      <strong style="color:#67e8f9;">🚗 Folly Road Traffic</strong><br><br>
      <strong>Light & Flowing</strong><br>
      No major delays • Post-July 4th crowd has left
    </div>

    <div style="background:rgba(103,232,249,0.12); border:1px solid #67e8f9; border-radius:20px; padding:1.6rem; margin:2rem 0;">
      <strong>✅ Good time to head down right now</strong><br>
      Beach is opening up nicely.
    </div>

    <button onclick="refresh()">⟳ Refresh Live Conditions</button>

    <div class="footer">
      Updated • July 5, 2026 • 3:37 PM
    </div>
  </div>

  <script>
    function refresh() {
      const fill = document.getElementById('fill');
      const status = document.getElementById('status');
      
      fill.style.width = (20 + Math.random() * 50) + "%";
      status.textContent = "Chill Vibes • " + (3.1 + Math.random()*3).toFixed(1) + " / 10";
      
      alert("🌊 Refreshed — Folly is looking nice and chill right now!");
    }
  </script>
</body>
</html>
